name: Deploy Allure dashboard to Pi

on:
  push:
    branches: [main]
    paths:
      - "pi/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-allure
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync service files to the Pi
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new" \
            pi/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/pi/sites/gotyeah-allure/"

      - name: Ensure data dirs and (re)build the service
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
              set -e
              mkdir -p /home/pi/allure/results /home/pi/allure/history /home/pi/allure/report
              cd /home/pi/sites/gotyeah-allure
              docker compose up -d --build
              docker image prune -f
            '
