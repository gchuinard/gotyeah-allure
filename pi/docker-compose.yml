# Central Allure dashboard service, deployed to the Pi under /home/pi/sites/gotyeah-allure.
# Data (results / history / report) lives in the host volume /home/pi/allure so it
# survives rebuilds and is the rsync target of every repo's CI.
services:
  allure-generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    image: gotyeah-allure-generator:latest
    container_name: allure_generator
    restart: unless-stopped
    environment:
      ALLURE_ROOT: /allure
      ALLURE_HEARTBEAT: "900"   # rebuild at least every 15 min even without events
    volumes:
      - /home/pi/allure:/allure

  allure-web:
    image: nginx:1.27-alpine
    container_name: allure_web
    restart: unless-stopped
    depends_on:
      - allure-generator
    volumes:
      - /home/pi/allure/report:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # NPM proxies to http://allure_web:80 via the shared nginx-proxy-manager_default
    # network (declared below). 8095 stays published for direct host debugging.
    ports:
      - "8095:80"
    networks:
      - default
      - npm
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

# allure-web joins NPM's existing shared network so NPM reaches it by container
# name (http://allure_web:80). This network is created by the NPM compose stack.
networks:
  npm:
    name: nginx-proxy-manager_default
    external: true
