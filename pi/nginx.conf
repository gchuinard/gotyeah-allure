# Serves the generated unified Allure report (static). Sits behind Nginx Proxy
# Manager + Cloudflare Access (One-time PIN) — no auth here on purpose.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allure is a SPA-ish static bundle; fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight liveness endpoint for NPM / compose healthchecks.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
